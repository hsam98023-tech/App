name: Generate APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android APK
        uses: bubblewrap/android-build-action@v1.5.0
        with:
          swUrl: 'https://dn-e-sport-clan-ff.vercel.app/sw.js'
          manifestUrl: 'https://dn-e-sport-clan-ff.vercel.app/manifest.json'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DN-CLAN-APK
          path: ./*.apk
          
