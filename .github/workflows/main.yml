name: Generate APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث لـ v4

      - name: Build Android App
        # استعملنا أداة مباشرة ومحدثة
        uses: pwa-builder/pwa-auth-action@v1 
        with:
          url: 'https://dn-e-sport-clan-ff.vercel.app'

      - name: Upload APK
        uses: actions/upload-artifact@v4 # تحديث لـ v4 باش يتحل الخطأ
        with:
          name: DN-CLAN-APP
          path: ./**/*.apk
          
